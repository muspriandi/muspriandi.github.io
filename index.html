<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sqids Encoder / Decoder</title>
<meta name="description" content="Encode numbers to short unique IDs and decode them back, using Sqids.">
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --text: #1a1d21;
    --muted: #6b7280;
    --border: #e2e5e9;
    --accent: #4f46e5;
    --accent-soft: #eef2ff;
    --error: #dc2626;
    --ok: #16a34a;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101318;
      --card: #1a1f27;
      --text: #e8eaed;
      --muted: #9aa2ad;
      --border: #2c333d;
      --accent: #818cf8;
      --accent-soft: #23283f;
      --error: #f87171;
      --ok: #4ade80;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  main {
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem 1rem 3rem;
    flex: 1;
  }
  h1 { font-size: 1.5rem; margin: 0 0 0.25rem; }
  .subtitle { color: var(--muted); margin: 0 0 1.5rem; font-size: 0.95rem; }
  .subtitle a { color: var(--accent); }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 4px solid var(--section-color, var(--accent));
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }
  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.25rem 0.75rem;
    margin-bottom: 1rem;
  }
  .section-header h2 {
    font-size: 1.05rem;
    margin: 0;
    color: var(--section-color, var(--text));
  }
  .section-config {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    word-break: break-all;
  }
  .pane-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 0.4rem;
    font-weight: 600;
  }
  .panes { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 560px) { .panes { grid-template-columns: 1fr; } }
  input[type="text"] {
    width: 100%;
    padding: 0.55rem 0.7rem;
    font-size: 0.95rem;
    font-family: var(--mono);
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    outline: none;
  }
  input:focus { border-color: var(--section-color, var(--accent)); }
  .result-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.6rem;
  }
  .result {
    flex: 1;
    font-family: var(--mono);
    font-size: 0.95rem;
    padding: 0.55rem 0.7rem;
    background: var(--accent-soft);
    border-radius: 8px;
    word-break: break-all;
    min-height: 2.35rem;
    display: flex;
    align-items: center;
  }
  .result.empty { color: var(--muted); font-size: 0.85rem; }
  .result.error { background: transparent; color: var(--error); border: 1px dashed var(--error); font-size: 0.85rem; }
  button.copy {
    flex-shrink: 0;
    padding: 0.5rem 0.8rem;
    font-size: 0.8rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    cursor: pointer;
  }
  button.copy:hover { border-color: var(--section-color, var(--accent)); color: var(--section-color, var(--accent)); }
  button.copy.copied { border-color: var(--ok); color: var(--ok); }
  footer {
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
    padding: 1rem;
  }
  footer a { color: var(--accent); }
</style>
</head>
<body>
<main>

        for (let i = 0, j = chars.length - 1; j > 0; i++, j--) {
            const r = (i * j + chars[i].codePointAt(0) + chars[j].codePointAt(0)) %
                chars.length;
            [chars[i], chars[r]] = [chars[r], chars[i]];
        }
        return chars.join('');
    }
    toId(num, alphabet) {
        const id = [];
        const chars = alphabet.split('');
        let result = num;
        do {
            id.unshift(chars[result % chars.length]);
            result = Math.floor(result / chars.length);
        } while (result > 0);
        return id.join('');
    }
    toNumber(id, alphabet) {
        const chars = alphabet.split('');
        return id.split('').reduce((a, v) => a * chars.length + chars.indexOf(v), 0);
    }
    isBlockedId(id) {
        const lowercaseId = id.toLowerCase();
        for (const word of this.blocklist) {
            if (word.length <= lowercaseId.length) {
                if (lowercaseId.length <= 3 || word.length <= 3) {
                    if (lowercaseId === word) {
                        return true;
                    }
                }
                else if (/\d/.test(word)) {
                    if (lowercaseId.startsWith(word) || lowercaseId.endsWith(word)) {
                        return true;
                    }
                }
                else if (lowercaseId.includes(word)) {
                    return true;
                }
            }
        }
        return false;
    }
    maxValue() {
        return Number.MAX_SAFE_INTEGER;
    }
}

/* ============================================================
 * ✏️  EDIT ME — section configuration
 *
 * Each section gets its own Sqids alphabet and minimum ID
 * length. The alphabets below are DUMMY placeholders — replace
 * them with your real ones. Rules:
 *   - at least 3 characters, all unique
 *   - encode & decode only match when the alphabet is the same
 * ============================================================ */
var SECTIONS = [
  {
    name: 'Catalog Category',
    color: '#4f46e5', // indigo
    alphabet: 'pV2D7ZbzRPSulJdgNctvFq1KGhfH54wsUETn6oQr8Bi3mMACa09exYOkLyXjWI',
    minLength: 16,
  },
  {
    name: 'Item',
    color: '#0d9488', // teal
    alphabet: 'qQAh6OedzXGJHiTn3WE0vK7yNCtl8c5UmfsLoxgjYPDIuMS1kwF492aVRpZrbB',
    minLength: 16,
  },
  {
    name: 'Variant',
    color: '#d97706', // amber
    alphabet: '70lMmTAPvUjuGLrORNeHS84ca9hsgynDkxJVpCwfKEZib1qXdz3t52Q6FoYIWB',
    minLength: 16,
  },
];

/* ============================================================
 * App logic — renders one encode/decode card per section
 * ============================================================ */
(function () {
  var container = document.getElementById('sections');

  function setResult(el, copyBtn, text, state) {
    el.textContent = text;
    el.classList.toggle('empty', state === 'empty');
    el.classList.toggle('error', state === 'error');
    copyBtn.hidden = state !== 'ok';
  }

  function parseNumbers(raw) {
    var parts = raw.split(/[\s,;]+/).filter(Boolean);
    var numbers = [];
    for (var i = 0; i < parts.length; i++) {
      if (!/^\d+$/.test(parts[i])) {
        throw new Error('"' + parts[i] + '" is not a non-negative integer');
      }
      var n = Number(parts[i]);
      if (!Number.isSafeInteger(n)) {
        throw new Error('"' + parts[i] + '" exceeds the maximum safe integer (' + Number.MAX_SAFE_INTEGER + ')');
      }
      numbers.push(n);
    }
    return numbers;
  }

  function bindCopy(button, resultEl) {
    button.addEventListener('click', function () {
      var text = resultEl.textContent.split('  (non-canonical')[0];
      navigator.clipboard.writeText(text).then(function () {
        button.textContent = 'Copied!';
        button.classList.add('copied');
        setTimeout(function () {
          button.textContent = 'Copy';
          button.classList.remove('copied');
        }, 1500);
      });
    });
  }

  function el(tag, className, text) {
    var node = document.createElement(tag);
    if (className) node.className = className;
    if (text) node.textContent = text;
    return node;
  }

  function buildPane(labelText, placeholder, resultPlaceholder) {
    var pane = el('div');
    pane.appendChild(el('p', 'pane-label', labelText));
    var input = document.createElement('input');
    input.type = 'text';
    input.spellcheck = false;
    input.autocomplete = 'off';
    input.placeholder = placeholder;
    pane.appendChild(input);
    var row = el('div', 'result-row');
    var result = el('div', 'result empty', resultPlaceholder);
    var copy = el('button', 'copy', 'Copy');
    copy.hidden = true;
    row.appendChild(result);
    row.appendChild(copy);
    pane.appendChild(row);
    bindCopy(copy, result);
    return { pane: pane, input: input, result: result, copy: copy };
  }

  SECTIONS.forEach(function (section) {
    var sqids;
    var configError = null;
    try {
      sqids = new Sqids({ alphabet: section.alphabet, minLength: section.minLength });
    } catch (e) {
      configError = e.message;
    }

    var card = el('div', 'card');
    card.style.setProperty('--section-color', section.color);

    var header = el('div', 'section-header');
    header.appendChild(el('h2', null, section.name));
    header.appendChild(el('span', 'section-config',
      'minLength: ' + section.minLength + ' · alphabet: ' + section.alphabet.slice(0, 12) + '…'));
    card.appendChild(header);

    if (configError) {
      var err = el('div', 'result error', 'Invalid config for this section: ' + configError);
      card.appendChild(err);
      container.appendChild(card);
      return;
    }

    var panes = el('div', 'panes');
    var enc = buildPane('Encode — numbers → ID', 'e.g. 12', 'ID appears here');
    var dec = buildPane('Decode — ID → numbers', 'e.g. ' + sqids.encode([12]), 'Numbers appear here');
    panes.appendChild(enc.pane);
    panes.appendChild(dec.pane);
    card.appendChild(panes);
    container.appendChild(card);

    enc.input.addEventListener('input', function () {
      var raw = enc.input.value.trim();
      if (!raw) {
        setResult(enc.result, enc.copy, 'ID appears here', 'empty');
        return;
      }
      try {
        var id = sqids.encode(parseNumbers(raw));
        setResult(enc.result, enc.copy, id, 'ok');
      } catch (e) {
        setResult(enc.result, enc.copy, e.message, 'error');
      }
    });

    dec.input.addEventListener('input', function () {
      var raw = dec.input.value.trim();
      if (!raw) {
        setResult(dec.result, dec.copy, 'Numbers appear here', 'empty');
        return;
      }
      try {
        var numbers = sqids.decode(raw);
        if (numbers.length === 0) {
          setResult(dec.result, dec.copy, 'Not a valid ID for this section’s alphabet', 'error');
          return;
        }
        // Round-trip check: a canonical ID re-encodes to itself
        var canonical = sqids.encode(numbers);
        var text = numbers.join(', ');
        if (canonical !== raw) {
          text += '  (non-canonical: re-encodes to "' + canonical + '")';
        }
        setResult(dec.result, dec.copy, text, 'ok');
      } catch (e) {
        setResult(dec.result, dec.copy, e.message, 'error');
      }
    });
  });
})();
